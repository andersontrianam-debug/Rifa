<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Estudiantes - Selecciona tu Número</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
        }

        .user-badge {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stats span {
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            background: #f0f0f0;
        }

        .stats .libres {
            background: #4caf50;
            color: white;
        }

        .stats .ocupados {
            background: #f44336;
            color: white;
        }

        .panel-numeros {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .numero {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .numero.libre {
            background: #4caf50;
            color: white;
            cursor: pointer;
        }

        .numero.libre:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .numero.ocupado {
            background: #f44336;
            color: white;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .numero.seleccionado {
            background: #ff9800;
            transform: scale(0.95);
            box-shadow: 0 0 0 3px #ff9800;
        }

        .info-seleccion {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            text-align: center;
        }

        .info-seleccion span {
            font-weight: bold;
            color: #ff9800;
            font-size: 1.2rem;
        }

        .info-seleccion .error {
            color: #f44336;
        }

        .info-seleccion .success {
            color: #4caf50;
        }

        /* Modal de registro */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-registrar {
            width: 100%;
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-registrar:hover {
            background: #45a049;
        }

        .mensaje {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .mensaje.success {
            background: #d4edda;
            color: #155724;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .panel-numeros {
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
            }
            .numero {
                font-size: 0.9rem;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
    <h1>🎲 Rifa Académica - Selecciona tu Número</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div class="user-badge">👤 Modo Estudiante</div>
        <button onclick="cerrarSesion()" class="btn-salir" style="background: #666;">🚪 Salir</button>
    </div>
</div>

        <div class="stats">
            <span class="libres">🟢 Libres: <span id="libresCount">0</span></span>
            <span class="ocupados">🔴 Ocupados: <span id="ocupadosCount">0</span></span>
        </div>

        <div class="panel-numeros" id="panelNumeros">
            <div class="loading" style="text-align: center; padding: 50px;">Cargando números...</div>
        </div>

        <div class="info-seleccion" id="infoSeleccion">
            💡 Haz clic en un número <strong>verde</strong> para seleccionarlo y registrarte
        </div>
    </div>

    <!-- Modal de registro -->
    <div id="registroModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📝 Completa tus datos</h2>
                <button class="close" onclick="cerrarModal()">&times;</button>
            </div>
            <form id="registroForm">
                <div class="form-group">
                    <label>🎯 Número seleccionado:</label>
                    <input type="text" id="numeroSeleccionadoInput" readonly style="background: #f0f0f0; font-size: 1.2rem; font-weight: bold; text-align: center;">
                </div>
                <div class="form-group">
                    <label>👤 Nombre completo:</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>🆔 Documento de identidad:</label>
                    <input type="text" id="documento" placeholder="Solo números (5-20 dígitos)" required>
                </div>
                <div class="form-group">
    <label>📱 Número de celular:</label>
    <input type="tel" id="celular" placeholder="Ej: 3123456789 (10 dígitos)" required>
    <small style="color: #666; font-size: 12px;">Ingresa 10 dígitos sin espacios ni guiones</small>
</div>
                <div class="form-group">
                    <label>📚 Programa académico:</label>
                    <select id="programa" required>
                        <option value="">Seleccione un programa</option>
                        <option value="Ingeniería">Ingeniería</option>
                        <option value="Medicina">Medicina</option>
                        <option value="Derecho">Derecho</option>
                        <option value="Administración">Administración</option>
                        <option value="Arquitectura">Arquitectura</option>
                    </select>
                </div>
                <button type="submit" class="btn-registrar">✅ Registrar y Obtener Número</button>
            </form>
            <div id="modalMensaje" class="mensaje" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let numerosData = [];
        let numeroSeleccionado = null;

        // Cargar números
        async function cargarNumeros() {
            try {
                const response = await fetch(`${API_URL}/numeros`);
                if (!response.ok) throw new Error('Error al cargar números');
                
                numerosData = await response.json();
                renderPanel();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('panelNumeros').innerHTML = 
                    '<div class="loading">❌ Error al cargar números. Por favor, recarga la página.</div>';
            }
        }

        // Renderizar panel
        function renderPanel() {
            const panel = document.getElementById('panelNumeros');
            panel.innerHTML = '';
            
            let libres = 0;
            let ocupados = 0;
            
            numerosData.forEach(num => {
                const btn = document.createElement('button');
                btn.textContent = num.numero;
                btn.classList.add('numero');
                btn.classList.add(num.estado);
                btn.dataset.numero = num.numero;
                
                if (num.estado === 'libre') {
                    libres++;
                    btn.addEventListener('click', () => seleccionarNumero(num.numero));
                } else {
                    ocupados++;
                    btn.disabled = true;
                }
                
                if (numeroSeleccionado === num.numero) {
                    btn.classList.add('seleccionado');
                }
                
                panel.appendChild(btn);
            });
            
            document.getElementById('libresCount').textContent = libres;
            document.getElementById('ocupadosCount').textContent = ocupados;
        }

        // Seleccionar número y abrir modal
        function seleccionarNumero(numero) {
            numeroSeleccionado = numero;
            document.getElementById('numeroSeleccionadoInput').value = numero;
            abrirModal();
        }

        // Abrir modal de registro
        function abrirModal() {
            const modal = document.getElementById('registroModal');
            modal.style.display = 'flex';
        }

        // Cerrar modal
        function cerrarModal() {
            const modal = document.getElementById('registroModal');
            modal.style.display = 'none';
            document.getElementById('registroForm').reset();
            document.getElementById('modalMensaje').style.display = 'none';
        }

        // Registrar estudiante
        async function registrarEstudiante(event) {
    event.preventDefault();
    
    const numero = numeroSeleccionado;
    const nombre = document.getElementById('nombre').value.trim();
    const documento = document.getElementById('documento').value.trim();
    const programa = document.getElementById('programa').value;
    const celular = document.getElementById('celular').value.trim();
    
    // Validaciones
    if (!nombre || nombre.length < 3) {
        mostrarMensajeModal('❌ El nombre debe tener al menos 3 caracteres', 'error');
        return;
    }
    
    if (!documento || !/^\d{5,20}$/.test(documento)) {
        mostrarMensajeModal('❌ El documento debe contener solo números (5-20 dígitos)', 'error');
        return;
    }
    
    if (!celular || !/^\d{10}$/.test(celular)) {
        mostrarMensajeModal('❌ El celular debe contener 10 dígitos (ej: 3123456789)', 'error');
        return;
    }
    
    if (!programa) {
        mostrarMensajeModal('❌ Por favor, selecciona un programa', 'error');
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/estudiantes/registrar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, documento, programa, celular, numero })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            mostrarMensajeModal(`✅ ${data.message}`, 'success');
            setTimeout(() => {
                cerrarModal();
                numeroSeleccionado = null;
                cargarNumeros();
                mostrarMensajeTemporal(`🎉 ¡Registro exitoso! Número ${numero} asignado a ${nombre}`, 'success');
            }, 2000);
        } else {
            mostrarMensajeModal(`❌ ${data.error}`, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarMensajeModal('❌ Error conectando con el servidor', 'error');
    }
}

        function mostrarMensajeModal(mensaje, tipo) {
            const msgDiv = document.getElementById('modalMensaje');
            msgDiv.textContent = mensaje;
            msgDiv.className = `mensaje ${tipo}`;
            msgDiv.style.display = 'block';
        }

        function mostrarMensajeTemporal(mensaje, tipo) {
            const infoDiv = document.getElementById('infoSeleccion');
            const color = tipo === 'error' ? '#f44336' : '#4caf50';
            infoDiv.innerHTML = `<span style="color: ${color}">${mensaje}</span>`;
            setTimeout(() => {
                infoDiv.innerHTML = '💡 Haz clic en un número <strong>verde</strong> para seleccionarlo y registrarte';
            }, 5000);
        }

        function cerrarSesion() {
    if (confirm('¿Volver a la página principal?')) {
        window.location.href = 'index.html';
    }
}

        // Event listeners
        document.getElementById('registroForm').addEventListener('submit', registrarEstudiante);
        
        // Recargar panel cada 5 segundos
        setInterval(() => {
            cargarNumeros();
        }, 5000);

        // Inicializar
        cargarNumeros();
    </script>
</body>
</html>
